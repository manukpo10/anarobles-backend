# Configuración del servidor
server.port=8080

# Configuración de la base de datos (PostgreSQL de Supabase)
spring.datasource.url=jdbc:postgresql://postgres.rxwtsgcwsaxcbmriepoz:${DB_PASSWORD}@aws-1-us-west-2.pooler.supabase.com:6543/postgres?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuración de JWT
jwt.secret=${JWT_SECRET:anacecilia-art-secret-key-very-long-for-production-2024}
jwt.expiration=86400000

# Mercado Pago (dejar vacío para modo demo)
mp.access-token=${MP_ACCESS_TOKEN:}
mp.site-url=${SITE_URL:https://anarobles-frontend.vercel.app}
mp.backend-url=${BACKEND_URL:https://anarobles-backend.onrender.com}

# Configuración de la aplicación
spring.application.name=anarobles-backend

# Mostrar SQL en consola (para debugging)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE