# Configuración del servidor
server.port=8080

# Conexión directa a Supabase (sin pooler) para evitar límite de 15 conexiones del pooler
# User directo es 'postgres', no el format pooler 'postgres.rxwtsgcwsaxcbmriepoz'
spring.datasource.url=jdbc:postgresql://db.rxwtsgcwsaxcbmriepoz.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# HikariCP - pool size para conexión directa a Supabase
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Mercado Pago
mp.access-token=${MP_ACCESS_TOKEN:value}
mp.site-url=${SITE_URL:http://localhost:3000}
mp.backend-url=${BACKEND_URL:http://localhost:8080}

# Cargar .env local si existe
spring.config.import=optional:file:.env

spring.application.name=anarobles-backend

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE