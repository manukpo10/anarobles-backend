# Configuración del servidor
server.port=8080

# Configuración de la base de datos (PostgreSQL en Supabase - Direct Connection)
# Connection string directa: postgresql://postgres:[PASSWORD]@db.rxwtsgcwsaxcbmriepoz.supabase.co:5432/postgres
spring.datasource.url=jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:5432/postgres
spring.datasource.username=${DB_USER:postgres.rxwtsgcwsaxcbmriepoz}
spring.datasource.password=${DB_PASSWORD:}

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Mercado Pago
mp.access-token=${MP_ACCESS_TOKEN:}
mp.site-url=${SITE_URL:http://localhost:3000}
mp.backend-url=${BACKEND_URL:http://localhost:8080}

spring.application.name=anarobles-backend

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE