# Configuración del servidor
server.port=8080

# Configuración de la base de datos (H2 en memoria)
spring.datasource.url=jdbc:h2:mem:anarobles
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accesible desde navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Configuración de JWT
jwt.secret=anacecilia-art-secret-key-very-long-for-production-2024
jwt.expiration=86400000

# Mercado Pago (dejar vacío para modo demo)
mp.access-token=${MP_ACCESS_TOKEN:}
mp.site-url=${SITE_URL:http://localhost:3000}
mp.backend-url=${BACKEND_URL:http://localhost:8080}

# Configuración de la aplicación
spring.application.name=anarobles-backend

# Mostrar SQL en consola (más detallado)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE